market_id: neimeng
name: 内蒙古
region: neimeng
task: da
freq: hourly
timezone: Asia/Shanghai
test_start: "2026-01-27"
test_end: "2026-04-17"

prediction_globs:
  - "${WORKSPACE_ROOT}/neimeng_prj/output/experiments/**/test_predictions_hourly.csv"

data:
  version: v1
  source: "${WORKSPACE_ROOT}/neimeng_prj/output/dws_15min_features_ext_data4_hongjing.csv"
  source_ts_col: ts
  freq: 15min
  preprocess:
    - fill_sudun_prices
    - fill_hongjing_from_unified
    - fill_unified_from_sudun
  time_range: ["2025-01-13 00:00:00", "2026-04-17 23:45:00"]

notes: |
  统一数据源含 22 列特征 + 苏敦/红井/统一出清价。
  fill_sudun_prices 补齐苏敦三列（09-29 整日缺失用 price_unified 代理）。
  fill_hongjing_from_unified 补齐红井三列（09-29 整日缺失用 price_unified 代理）。
  fill_unified_from_sudun 补齐统一出清价（04-09 整日缺失用苏敦节点价代理）。
  features.target_default 是默认 target；算法可从 alt_targets 中选其它列。

# 跨算法共享的特征本体（由 pfbench.feature_registry 读取并解析）。
# 详见 pfbench/feature_registry.py 中 FEATURE_GROUPS 的定义。
features:
  target_default: price_hongjing_220kv1m_nodal      # 红井 220kV 节点电价（含能量+阻塞）
  alt_targets:
    - price_hongjing_220kv1m_nodal      # 红井节点价（默认）
    - price_hongjing_220kv1m_energy     # 红井能量价
    - price_hongjing_220kv1m_cong       # 红井阻塞价
    - price_sudun_500kv1m_nodal         # 苏敦节点价
    - price_sudun_500kv1m_energy
    - price_sudun_500kv1m_cong
    - price_unified                     # 全网统一出清价
    - price_hbd                         # 呼包东统一价
    - price_hbx                         # 呼包西统一价

  # 各类别默认 lag 标签；算法侧可通过 FeatureSpec.lag_overrides 覆盖。
  # 语义化 lag，运行时由 pfbench.lag_resolver 按 freq (1h/15min) 转为 periods。
  default_lag_labels:
    BOUNDARY: []                  # 不 shift（D 日已知）
    BOUNDARY_CLEARED: []
    WEATHER: []
    CLEARING_DA: ["1d", "2d", "7d"]
    CLEARING_RT: ["1d", "2d", "7d"]
    ACTUAL: ["2d", "7d"]

  groups:
    BOUNDARY:                     # D-1 末已知的事前预测/计划/边界
      enabled: true
      cols:
        - load_forecast
        - renewable_forecast
        - wind_forecast
        - solar_forecast
        - east_send_forecast
        - reserve_pos_capacity
        - reserve_neg_capacity
        - price_dayahead_preclear_energy
    BOUNDARY_CLEARED:             # 出清修正版（内蒙数据无此类）
      enabled: false
      cols: []
    WEATHER:                      # 三市场统一不使用天气
      enabled: false
      cols: []
    CLEARING_DA:                  # 历史日前出清价（含节点价）
      enabled: true
      cols:
        - price_unified
        - price_hbd
        - price_hbx
        - price_sudun_500kv1m_nodal
        - price_sudun_500kv1m_energy
        - price_sudun_500kv1m_cong
        - price_hongjing_220kv1m_nodal
        - price_hongjing_220kv1m_energy
        - price_hongjing_220kv1m_cong
    CLEARING_RT:                  # 内蒙无独立实时价
      enabled: false
      cols: []
    ACTUAL:                       # 历史实际运行值
      enabled: true
      cols:
        - load_actual
        - renewable_actual
        - wind_actual
        - solar_actual
